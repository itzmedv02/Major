services:
  - type: web
    name: rainfall-prediction-api
    env: python
    region: singapore
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
      - key: FLASK_ENV
        value: production
      - key: OPENWEATHER_API_KEY
        sync: false
